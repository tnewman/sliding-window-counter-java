name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build with Gradle
        run: ./gradlew build

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'release' && github.ref == 'refs/tags/*')
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: '${{ secrets.MAVEN_CENTRAL_USERNAME }}'
      ORG_GRADLE_PROJECT_mavenCentralPassword: '${{ secrets.MAVEN_CENTRAL_PASSWORD }}'
      ORG_GRADLE_PROJECT_signingInMemoryKeyId: '${{ vars.SIGNING_IN_MEMORY_KEY_ID }}'
      ORG_GRADLE_PROJECT_signingInMemoryKey: '${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}'
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: '${{ secrets.SIGNING_IN_MEMORY_KEY }}'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set Snapshot Version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "VERSION=0.0.0-SNAPSHOT" >> $GITHUB_ENV

      - name: Set Release Version
        if: github.event_name == 'release' && github.ref == 'refs/tags/*'
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Publish Snapshot to Maven Central
        run: ./gradlew publishToMavenCentral -Pversion=${{ env.RELEASE_VERSION }}
